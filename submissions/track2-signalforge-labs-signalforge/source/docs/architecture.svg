<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">SignalForge local-first architecture</title>
  <desc id="desc">A layered architecture diagram showing the investor workspace, Go control plane, local specialist agents, deterministic authority services, and AMD Radeon ROCm inference runtime.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3e8"/>
      <stop offset="1" stop-color="#e9efe9"/>
    </linearGradient>
    <linearGradient id="gpu" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0b2633"/>
      <stop offset="1" stop-color="#174f56"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#09202b" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#4e6f73"/>
    </marker>
    <style>
      .title { font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 38px; font-weight: 700; fill: #102c38; }
      .subtitle { font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 17px; fill: #52676b; }
      .layer { font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 14px; font-weight: 700; letter-spacing: 2px; fill: #a25a2b; }
      .h { font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 20px; font-weight: 700; fill: #102c38; }
      .body { font-family: "Avenir Next", "Trebuchet MS", sans-serif; font-size: 14px; fill: #40575d; }
      .mono { font-family: "IBM Plex Mono", "Courier New", monospace; font-size: 13px; fill: #24444c; }
      .white { fill: #f8fbf8; }
      .small { font-size: 12px; }
      .node { fill: #fffdf7; stroke: #b8c8c3; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .model { fill: #edf6f0; stroke: #4e8077; stroke-width: 1.5; rx: 13; }
      .software { fill: #fff4df; stroke: #bd7a3b; stroke-width: 1.5; rx: 13; }
      .flow { fill: none; stroke: #4e6f73; stroke-width: 2; marker-end: url(#arrow); }
      .muted { fill: none; stroke: #8fa7a4; stroke-width: 1.5; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#paper)"/>
  <path d="M0 740 C320 665 530 820 850 745 C1140 676 1350 720 1600 640 L1600 1000 L0 1000 Z" fill="#d9e6df" opacity="0.55"/>

  <text x="72" y="67" class="title">SignalForge architecture</text>
  <text x="72" y="96" class="subtitle">Local financial research with typed authority, deterministic calculations, and specialist inference on AMD Radeon</text>

  <text x="72" y="142" class="layer">01  INVESTOR EXPERIENCE</text>
  <rect x="72" y="160" width="1456" height="112" class="node"/>
  <text x="102" y="197" class="h">Research Workspace</text>
  <text x="102" y="223" class="body">Question, scenario controls, progressive answer, evidence drawer, calculation receipts, caveats, and governed follow-ups</text>
  <rect x="1120" y="181" width="176" height="62" class="software"/>
  <text x="1140" y="207" class="h" font-size="17">Privacy controls</text>
  <text x="1140" y="228" class="body small">Inspect / export / delete</text>
  <rect x="1313" y="181" width="181" height="62" class="software"/>
  <text x="1333" y="207" class="h" font-size="17">Safe projection</text>
  <text x="1333" y="228" class="body small">No prompts or CoT</text>

  <path d="M800 272 L800 310" class="flow"/>

  <text x="72" y="326" class="layer">02  GO CONTROL PLANE</text>
  <rect x="72" y="344" width="1456" height="142" class="node"/>
  <rect x="98" y="372" width="250" height="80" class="software"/>
  <text x="120" y="402" class="h">Interpreter</text>
  <text x="120" y="426" class="body">Closed intent + scope</text>
  <rect x="378" y="372" width="270" height="80" class="software"/>
  <text x="400" y="402" class="h">Bounded Orchestrator</text>
  <text x="400" y="426" class="body">Plan, fan-out, review, retry</text>
  <rect x="678" y="372" width="250" height="80" class="software"/>
  <text x="700" y="402" class="h">Context Compiler</text>
  <text x="700" y="426" class="body">Budget, conflict, freshness</text>
  <rect x="958" y="372" width="250" height="80" class="software"/>
  <text x="980" y="402" class="h">Tool / Policy Gate</text>
  <text x="980" y="426" class="body">Role authority + permissions</text>
  <rect x="1238" y="372" width="264" height="80" class="software"/>
  <text x="1260" y="402" class="h">Answer Compiler</text>
  <text x="1260" y="426" class="body">Joins, checks, publication</text>
  <path d="M348 412 L378 412" class="flow"/>
  <path d="M648 412 L678 412" class="flow"/>
  <path d="M928 412 L958 412" class="flow"/>
  <path d="M1208 412 L1238 412" class="flow"/>

  <path d="M513 486 L513 530" class="flow"/>
  <path d="M1083 486 L1083 530" class="flow"/>

  <text x="72" y="548" class="layer">03  SPECIALIST TEAM  ·  MODEL AUTHORITY</text>
  <rect x="72" y="566" width="884" height="188" class="node"/>
  <rect x="97" y="594" width="192" height="58" class="model"/>
  <text x="117" y="621" class="h" font-size="17">Accounting</text><text x="117" y="642" class="body small">US GAAP context</text>
  <rect x="309" y="594" width="192" height="58" class="model"/>
  <text x="329" y="621" class="h" font-size="17">Economics</text><text x="329" y="642" class="body small">Transmission mechanisms</text>
  <rect x="521" y="594" width="192" height="58" class="model"/>
  <text x="541" y="621" class="h" font-size="17">Valuation</text><text x="541" y="642" class="body small">Assumptions + tool calls</text>
  <rect x="733" y="594" width="198" height="58" class="model"/>
  <text x="753" y="621" class="h" font-size="17">Market Behavior</text><text x="753" y="642" class="body small">Positioning and risk</text>
  <rect x="97" y="672" width="192" height="58" class="model"/>
  <text x="117" y="699" class="h" font-size="17">Business Strategy</text><text x="117" y="720" class="body small">Moat and business model</text>
  <rect x="309" y="672" width="192" height="58" class="model"/>
  <text x="329" y="699" class="h" font-size="17">Evidence Critic</text><text x="329" y="720" class="body small">Support and contradiction</text>
  <rect x="521" y="672" width="192" height="58" class="model"/>
  <text x="541" y="699" class="h" font-size="17">Risk / Contrarian</text><text x="541" y="720" class="body small">Thesis invalidation</text>
  <rect x="733" y="672" width="198" height="58" class="model"/>
  <text x="753" y="699" class="h" font-size="17">Final Analyst</text><text x="753" y="720" class="body small">Qualitative synthesis only</text>

  <text x="986" y="548" class="layer">04  DETERMINISTIC AUTHORITY</text>
  <rect x="986" y="566" width="542" height="188" class="node"/>
  <rect x="1011" y="594" width="230" height="58" class="software"/>
  <text x="1031" y="621" class="h" font-size="17">Primary Evidence</text><text x="1031" y="642" class="body small">SEC / IR / macro / market</text>
  <rect x="1260" y="594" width="243" height="58" class="software"/>
  <text x="1280" y="621" class="h" font-size="17">28 Go Tools</text><text x="1280" y="642" class="body small">Decimal finance + invariants</text>
  <rect x="1011" y="672" width="230" height="58" class="software"/>
  <text x="1031" y="699" class="h" font-size="17">Receipts + Lineage</text><text x="1031" y="720" class="body small">Hashes, replay, supersession</text>
  <rect x="1260" y="672" width="243" height="58" class="software"/>
  <text x="1280" y="699" class="h" font-size="17">Local Case Memory</text><text x="1280" y="720" class="body small">Opt-in SQLite projection</text>

  <path d="M956 624 L986 624" class="muted"/>
  <path d="M986 704 L956 704" class="muted"/>
  <path d="M1370 566 L1370 486" class="flow"/>

  <path d="M514 754 L514 812" class="flow"/>
  <path d="M1257 754 L1257 812" class="flow"/>

  <text x="72" y="832" class="layer">05  LOCAL INFERENCE RUNTIME</text>
  <rect x="72" y="850" width="1456" height="104" rx="18" fill="url(#gpu)" filter="url(#shadow)"/>
  <text x="104" y="890" class="h white">AMD Radeon GPU · ROCm 7.2.1 · gfx1100</text>
  <text x="104" y="918" class="body white">Gemma 4 26B A4B IT QAT Q4_0 · ROCm llama.cpp · unified F16 KV · 32,768 shared context · four local workers</text>
  <rect x="1258" y="872" width="235" height="56" rx="12" fill="#f0b35e"/>
  <text x="1280" y="899" class="h" font-size="17">No remote inference</text>
  <text x="1280" y="920" class="mono">loopback-only endpoint</text>

  <circle cx="78" cy="981" r="6" fill="#4e8077"/><text x="93" y="986" class="body small">Model: interpret, critique, synthesize</text>
  <circle cx="389" cy="981" r="6" fill="#bd7a3b"/><text x="404" y="986" class="body small">Software: values, tools, policy, lineage, publication</text>
  <text x="1188" y="986" class="mono small">signalforge/architecture-v1</text>
</svg>
